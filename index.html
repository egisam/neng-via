<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Mood Via 💗</title>

<style>

body{
margin:0;
font-family:"Comic Sans MS",cursive;
background:linear-gradient(135deg,#ffc0cb,#ff9ecb);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* floating hearts */

.heart{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
opacity:0.8;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* card */

.container{
background:white;
padding:35px;
border-radius:25px;
width:340px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
animation:pop 0.7s ease;
}

@keyframes pop{
0%{transform:scale(0.8);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

h2{
color:#ff4b8a;
margin-bottom:10px;
}

p{
color:#666;
font-size:14px;
margin-bottom:10px;
}

/* maskot */

.maskot{
font-size:50px;
margin-bottom:10px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

input,select,textarea{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid #ffd6e7;
margin:8px 0;
}

textarea{
height:70px;
resize:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:15px;
background:#ff6fa5;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
animation:buttonPulse 2s infinite;
}

@keyframes buttonPulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

button:hover{
background:#ff4b8a;
}

</style>
</head>

<body>

<!-- hearts background -->
<div class="heart" style="left:10%">💗</div>
<div class="heart" style="left:30%">💖</div>
<div class="heart" style="left:50%">💗</div>
<div class="heart" style="left:70%">💖</div>
<div class="heart" style="left:90%">💗</div>

<div class="container">

<div class="maskot">🐻🐰</div>

<h2>Mood Via 💗</h2>

<p>sharing mood with egi 💌</p>

<form action="https://formspree.io/f/xojkakkg"
method="POST"
onsubmit="return sendMood()">

<input type="text" name="nama" placeholder="Nama kamu" required>

<select name="mood">
<option>🥰 Lagi sayang kamu</option>
<option>😊 Lagi happy</option>
<option>😴 Lagi capek</option>
<option>😢 Lagi sedih</option>
<option>🤗 Lagi kangen</option>
</select>

<textarea name="pesan" placeholder="Tulis pesan buat egi"></textarea>

<button type="submit">Kirim ke egi 💖</button>

</form>

</div>

<script>
function sendMood(){
setTimeout(function(){
window.location.href="thanks.html";
},500);
return true;
}
</script>

</body>
</html>
