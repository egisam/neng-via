<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Terima Kasih 💗</title>

<style>

body{
margin:0;
font-family:"Comic Sans MS",cursive;
background:linear-gradient(135deg,#ffc0cb,#ff9ecb);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* hearts */

.heart{
position:absolute;
font-size:22px;
animation:explode 3s infinite;
}

@keyframes explode{

0%{
transform:translateY(0) scale(0.5);
opacity:1;
}

50%{
transform:translateY(-80px) scale(1.3);
}

100%{
transform:translateY(-160px) scale(0);
opacity:0;
}

}

/* card */

.card{
background:white;
padding:40px;
border-radius:25px;
width:340px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
animation:pop 0.7s ease;
}

@keyframes pop{
0%{transform:scale(0.8);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

h2{
color:#ff4b8a;
}

p{
color:#666;
font-size:14px;
}

/* maskot peluk */

.maskot{
font-size:60px;
margin:20px 0;
animation:hug 2.5s infinite;
}

@keyframes hug{
0%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
100%{transform:translateX(-6px);}
}

button{
margin-top:15px;
background:#ff6fa5;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:15px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ff4b8a;
}

</style>
</head>

<body>

<div class="heart" style="left:45%;bottom:40%">💗</div>
<div class="heart" style="left:50%;bottom:40%">💖</div>
<div class="heart" style="left:55%;bottom:40%">💗</div>

<div class="card">

<h2>Terima Kasih 💌</h2>

<div class="maskot">🐻💗🐰</div>

<p>Makasih sudah nyempetin waktu</p>
<p>buat kirim mood hari ini 🥺</p>

<p>Semoga harimu menyenangkan 💖</p>

<button onclick="window.location.href='index.html'">
Kirim Mood Lagi 💌
</button>

</div>

</body>
</html>
